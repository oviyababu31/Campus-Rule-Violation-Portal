<div style="padding: 20px; font-family: Arial, sans-serif;">
  
  <h2 style="color: #2c3e50;">Admin Dashboard</h2>

  <!-- CARDS -->
  <div style="display: flex; gap: 20px; margin-top: 20px;">

    <!-- Total Violations -->
    <div style="flex: 1; background: #3498db; color: white; padding: 30px; border-radius: 12px; text-align: center;">
      <h3>Total Violations</h3>
      <h1 style="font-size: 3rem;">{{ totalFines }}</h1>
    </div>

    <!-- Total Amount -->
    <div style="flex: 1; background: #27ae60; color: white; padding: 30px; border-radius: 12px; text-align: center;">
      <h3>Total Fines Collected</h3>
      <h1 style="font-size: 3rem;">₹{{ totalAmount }}</h1>
    </div>

    <!-- Total Students -->
    <div style="flex: 1; background: #9b59b6; color: white; padding: 30px; border-radius: 12px; text-align: center;">
      <h3>Total Students</h3>
      <h1 style="font-size: 3rem;">{{ totalStudents }}</h1>
    </div>

  </div>

  <!-- STUDENT TABLE -->
  <div style="margin-top: 30px; background: #fff; padding: 20px; border-radius: 12px;">
    
    <h3>Student Violations</h3>

    <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
      
      <tr style="background: #2c3e50; color: white;">
        <th style="padding: 10px;">Student Name</th>
        <th style="padding: 10px;">Roll No</th>
        <th style="padding: 10px;">Reason</th>
        <th style="padding: 10px;">Amount</th>
      </tr>

      <tr *ngFor="let s of students">
        <td style="padding: 10px;">{{ s.studentName }}</td>
        <td style="padding: 10px;">{{ s.rollNo }}</td>
        <td style="padding: 10px;">{{ s.reason }}</td>
        <td style="padding: 10px;">₹{{ s.amount }}</td>
      </tr>

    </table>

  </div>

</div>
