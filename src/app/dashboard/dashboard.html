<div style="padding: 20px; font-family: Arial, sans-serif;">
  <h2 style="color: #2c3e50;">Admin Dashboard</h2>
  
  <div style="display: flex; gap: 20px; margin-top: 20px;">
    <div style="flex: 1; background: #3498db; color: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
      <h3 style="margin: 0; opacity: 0.9;">Total Violations</h3>
      <h1 style="font-size: 3.5rem; margin: 10px 0;">{{ totalFines }}</h1>
    </div>

    <div style="flex: 1; background: #27ae60; color: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
      <h3 style="margin: 0; opacity: 0.9;">Total Fines Collected</h3>
      <h1 style="font-size: 3.5rem; margin: 10px 0;">₹{{ totalAmount }}</h1>
    </div>
  </div>
</div>
